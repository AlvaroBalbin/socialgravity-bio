<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Alvaro Balbin</title>
    <meta name="description" content="Talk to my AI twin. It knows what I know and sounds like me." />
    <meta property="og:title" content="Alvaro Balbin" />
    <meta property="og:description" content="Talk to my AI twin, voice or text, anytime." />
    <meta property="og:type" content="website" />
    <style>
      :root {
        --bg: #14140f;
        --fg: #f7f6ef;
        --muted: #9a988c;
        --card: rgba(247, 246, 239, 0.06);
        --line: rgba(247, 246, 239, 0.12);
        --accent: #f7f6ef;
      }
      * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
      html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg);
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif; }
      body { min-height: 100dvh; display: flex; justify-content: center; }
      .page { width: 100%; max-width: 480px; padding: 28px 20px calc(160px + env(safe-area-inset-bottom)); }
      .hero { text-align: center; padding: 14px 0 6px; }
      .avatar { width: 96px; height: 96px; border-radius: 999px; object-fit: cover;
        border: 1px solid var(--line); background: var(--card); margin: 0 auto 14px; display: block; }
      .name { font-size: 22px; font-weight: 650; letter-spacing: -0.01em; margin: 0; }
      .tagline { color: var(--muted); font-size: 14px; margin: 6px 0 0; }
      .links { margin: 26px 0 0; display: flex; flex-direction: column; gap: 12px; }
      .links a { display: flex; align-items: center; justify-content: center; gap: 8px;
        padding: 15px 18px; border-radius: 14px; background: var(--card); border: 1px solid var(--line);
        color: var(--fg); text-decoration: none; font-size: 15px; font-weight: 550;
        transition: transform .08s ease, background .15s ease; }
      .links a:active { transform: scale(0.985); background: rgba(247,246,239,0.10); }
      .sectlabel { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
        margin: 30px 0 10px; text-align: center; }
      .log { margin: 18px 0 0; display: flex; flex-direction: column; gap: 8px; }
      .msg { max-width: 85%; padding: 9px 13px; border-radius: 13px; font-size: 14px; line-height: 1.35; }
      .msg.visitor { align-self: flex-end; background: rgba(247,246,239,0.14); }
      .msg.twin { align-self: flex-start; background: var(--card); border: 1px solid var(--line); }

      /* Voice dock pinned to the bottom, in-app-browser friendly. */
      .dock { position: fixed; left: 0; right: 0; bottom: 0; display: flex; justify-content: center;
        padding: 14px 16px calc(16px + env(safe-area-inset-bottom));
        background: linear-gradient(to top, var(--bg) 60%, rgba(20,20,15,0)); }
      .dock-inner { width: 100%; max-width: 480px; }
      .caption { min-height: 18px; text-align: center; color: var(--fg); font-size: 14px;
        opacity: 0; transition: opacity .2s ease; margin: 0 0 10px; }
      .caption.show { opacity: 1; }
      .row { display: flex; gap: 10px; align-items: center; }
      .talk { flex: 1; display: flex; align-items: center; justify-content: center; gap: 10px;
        padding: 15px 18px; border-radius: 16px; border: 1px solid var(--line);
        background: var(--accent); color: #14140f; font-size: 15px; font-weight: 650; cursor: pointer; }
      .talk[data-state="connecting"] { opacity: .7; }
      .talk.mic-on { background: #c7402e; color: #fff; border-color: #c7402e; }
      .dot { width: 9px; height: 9px; border-radius: 999px; background: #14140f; }
      .talk.mic-on .dot { background: #fff; animation: pulse 1.1s infinite ease-in-out; }
      @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
      .textform { display: flex; gap: 8px; margin-top: 10px; }
      .textform input { flex: 1; padding: 13px 14px; border-radius: 14px; border: 1px solid var(--line);
        background: var(--card); color: var(--fg); font-size: 15px; outline: none; }
      .textform button { padding: 0 16px; border-radius: 14px; border: 1px solid var(--line);
        background: transparent; color: var(--fg); font-size: 14px; cursor: pointer; }
      .status { text-align: center; color: var(--muted); font-size: 12px; margin: 10px 0 0; }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <img class="avatar" id="avatar"
          src="https://ootcwmipvdlyvjcvdtpo.supabase.co/storage/v1/object/public/twin-page-assets/placeholder-avatar.png"
          alt="Alvaro Balbin"
          onerror="this.style.visibility='hidden'" />
        <h1 class="name">Alvaro Balbin</h1>
        <p class="tagline">Talk to my AI twin. It knows what I know and sounds like me.</p>
      </section>

      <!-- Links: edit freely. data-link-id lets the twin become aware of which
           one the visitor is viewing (page-awareness). -->
      <nav class="links">
        <a href="https://github.com/AlvaroBalbin" data-link-id="github" target="_blank" rel="noopener">GitHub</a>
        <a href="https://socialgravity.ai" data-link-id="socialgravity" target="_blank" rel="noopener">SocialGravity</a>
        <a href="https://www.linkedin.com/in/alvaro-balbin" data-link-id="linkedin" target="_blank" rel="noopener">LinkedIn</a>
      </nav>

      <div class="sectlabel">Conversation</div>
      <div class="log" id="log"></div>
    </main>

    <!-- Voice + text dock -->
    <div class="dock" id="dock" data-state="idle">
      <div class="dock-inner">
        <p class="caption" id="caption"></p>
        <div class="row">
          <button class="talk" id="talkBtn" type="button"><span class="dot"></span><span id="talkLabel">Talk</span></button>
        </div>
        <form class="textform" id="textForm" autocomplete="off">
          <input id="textInput" type="text" placeholder="…or type a message" />
          <button type="submit">Send</button>
        </form>
        <p class="status" id="status">Tap to talk to my twin</p>
      </div>
    </div>

    <script type="module" src="./app.js"></script>
  </body>
</html>
